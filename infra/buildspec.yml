version: 0.2

env:
  shell: bash

phases:
  pre_build:
    commands:
      - set -euo pipefail
      - AWS_REGION="${AWS_DEFAULT_REGION:-${AWS_REGION:-cn-northwest-1}}"
      - ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
      - AWS_DOMAIN="amazonaws.com"
      - if [[ "$AWS_REGION" == cn-* ]]; then AWS_DOMAIN="amazonaws.com.cn"; fi
      - IMAGE_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.${AWS_DOMAIN}/${IMAGE_REPO_NAME}:${IMAGE_TAG}"
      - echo "Logging in to ECR ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.${AWS_DOMAIN}"
      - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.${AWS_DOMAIN}"
      - docker version
      - docker buildx version
      - BINFMT_IMAGE="${BINFMT_IMAGE:-${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.${AWS_DOMAIN}/build-cache/binfmt:latest}"
      - docker run --privileged --rm "$BINFMT_IMAGE" --install all
      - BUILDER_NAME="multiarch-builder-${CODEBUILD_BUILD_NUMBER:-local}"
      - BUILDKIT_IMAGE="${BUILDKIT_IMAGE:-${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.${AWS_DOMAIN}/build-cache/buildkit:buildx-stable-1}"
      - docker buildx create --name "$BUILDER_NAME" --driver docker-container --driver-opt "image=$BUILDKIT_IMAGE" --use
      - docker buildx inspect --bootstrap
  build:
    commands:
      - BASE_IMAGE="${BASE_IMAGE:-${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.${AWS_DOMAIN}/build-cache/node:20-alpine}"
      - echo "Building $IMAGE_URI for $PLATFORMS"
      - docker buildx build --platform "$PLATFORMS" --build-arg "BASE_IMAGE=$BASE_IMAGE" --tag "$IMAGE_URI" --push app
      - docker buildx imagetools inspect "$IMAGE_URI"
  post_build:
    commands:
      - |
        printf '{"ImageURI":"%s","Platforms":"%s"}\n' "$IMAGE_URI" "$PLATFORMS" > imageDetail.json
      - |
        echo "Image pushed: $IMAGE_URI"

artifacts:
  files:
    - imageDetail.json
